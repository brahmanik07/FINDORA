<html lang="en">
<head>

<title>Findora</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    color: white;
}

h1 {
    font-size: 50px;
}

a {
    display: inline-block;
    margin: 10px;

    color: #333;
    text-decoration: none;
    border-radius: 25px;
    font-weight: bold;
    transition: 0.3s;
}

a:hover {
    background: #333;
    color: white;
}
</style>

<div class="container">
    <h1>FINDORA</h1>
