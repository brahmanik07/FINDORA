<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Findora Dashboard</title>

<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* Body */
body{
background:#f4f7fb;
}

/* Navbar */
.navbar{
background:#0f4c81;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.nav-links a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:14px;
}

.nav-links a:hover{
text-decoration:underline;
}

/* Container */
.container{
padding:30px;
}

/* Welcome */
.welcome{
margin-bottom:25px;
}

.welcome h1{
color:#333;
}

.welcome p{
color:#666;
}

/* Cards */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* Card */
.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card h3{
margin-bottom:10px;
color:#0f4c81;
}

.card p{
font-size:14px;
color:#555;
}

/* Button inside card */
.card button{
margin-top:15px;
padding:10px 15px;
border:none;
background:#1e88e5;
color:white;
border-radius:6px;
cursor:pointer;
}

.card button:hover{
background:#1565c0;
}

/* Animation */
.card{
animation:fadeIn 0.7s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
<div class="logo">Findora</div>

<div class="nav-links">
<a href="/">Home</a>
<a href="/login">Logout</a>
</div>
</div>

<!-- Main -->
<div class="container">

<div class="welcome">
<h1>Welcome to Findora 👋</h1>
<p>Manage lost and found items easily on your campus</p>
</div>

<!-- Cards -->
<div class="cards">

<div class="card">
<h3>Report Lost Item</h3>
<p>Lost something? Let others know.</p>
<button onclick="goTo('report_lost')">Report Lost</button>
</div>

<div class="card">
<h3>Report Found Item</h3>
<p>Found something? Help return it.</p>
<button onclick="goTo('report_found')">Report Found</button>
</div>

<div class="card">
<h3>Search Items</h3>
<p>Search lost or found items.</p>
<button onclick="goTo('search')">Search</button>
</div>

</div>

</div>

<script>

function goTo(page){
window.location.href = "/" + page;
}

</script>

</body>
</html>
